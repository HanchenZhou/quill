appId: com.quill.desktop
productName: Quill
copyright: Copyright © 2026

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true

# Declare which file types Quill knows how to open. On macOS this populates
# Info.plist → CFBundleDocumentTypes, which Finder reads to populate the
# "Open With" menu. Two groups so macOS shows them with distinct names:
#  - Markdown gets `rank: Default` so double-clicking an .md picks Quill
#    when no other editor is the registered default.
#  - All other text formats are `rank: Alternate` — Quill shows up in the
#    "Open With" submenu but doesn't fight VS Code / IDE defaults.
# Mirrors the supported set in packages/shared-types/src/fileTypes.ts.
fileAssociations:
  - ext:
      - md
      - markdown
      - mdown
      - mkd
    name: Markdown Document
    role: Editor
    rank: Default
    icon: build/icon.icns
  - ext:
      - txt
      - log
      - conf
      - ini
      - env
      - csv
      - tsv
      - properties
      - js
      - mjs
      - cjs
      - jsx
      - ts
      - tsx
      - mts
      - cts
      - json
      - html
      - htm
      - css
      - xml
      - svg
      - py
      - pyw
      - java
      - go
      - rs
      - c
      - h
      - cc
      - cpp
      - hpp
      - sql
      - php
      - yaml
      - yml
      - toml
      - sh
      - bash
      - zsh
      - rb
      - lua
      - ps1
      - r
      - diff
      - patch
      - vue
      - svelte
      - kt
      - kts
      - swift
      - scala
      - dart
      - gradle
      - bat
      - cmd
    name: Text File
    role: Editor
    rank: Alternate
    icon: build/icon.icns

mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  # No Apple Developer cert configured. `'-'` = ad-hoc signing (codesign
  # --sign -). On Apple Silicon every binary MUST carry at least an
  # ephemeral signature or macOS rejects launch with "Quill is damaged".
  # With ad-hoc, first-launch still warns ("unidentified developer"), but
  # the user can right-click → Open / accept via System Settings.
  identity: '-'
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  writeUpdateInfo: false
  artifactName: Quill-${version}-${arch}.dmg

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
