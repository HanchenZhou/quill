name: Release

# Trigger on tags shaped `yyyy.mm.dd-n` (e.g. 2026.05.22-1, 2026.05.22-2).
# Tag is the release identifier; product version lives in
# apps/desktop/package.json and is bumped manually on its own cadence.
#
# How to cut a release:
#   1. (optional) bump apps/desktop/package.json `version` if there are
#      meaningful changes since the last release
#   2. git tag 2026.05.22-1
#   3. git push origin 2026.05.22-1
#   4. wait ~10 min for the workflow to build + create the Release
#
# The .dmg filename embeds the package.json version (e.g. Quill-0.0.2-arm64.dmg).
# The Release name on GitHub is the tag itself.

on:
  push:
    tags:
      # YYYY.MM.DD-N — leading zeros OK on month/day, any suffix on -N
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*'

permissions:
  contents: write  # create GitHub Releases

jobs:
  build-macos-arm64:
    runs-on: macos-14  # Apple Silicon runner — required for arm64 build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for changelog generation by softprops/action-gh-release

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6  # match local dev (see CLAUDE.md)

      - name: Cache Bun install + electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck (cheap sanity gate)
        run: bun typecheck

      - name: Tests (cheap sanity gate)
        run: bun test

      - name: Build macOS arm64 dmg
        # The dist:mac:arm64 script lives in apps/desktop/package.json,
        # not the root. From repo root we have to address the workspace
        # explicitly — `bun run dist:mac:arm64` at root would just fail
        # with "Script not found".
        run: bun --filter @quill/desktop dist:mac:arm64
        env:
          # Skip code-signing for v1 — Apple Developer ID notarization isn't
          # set up. electron-builder respects CSC_IDENTITY_AUTO_DISCOVERY=false.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List build artifacts
        run: ls -la apps/desktop/release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # electron-builder.yml sets `directories.output: release/${version}`,
          # so the .dmg lands under apps/desktop/release/0.0.2/ etc. — use a
          # recursive glob so the path doesn't break when version bumps.
          # No .dmg.blockmap because dmg.writeUpdateInfo is false (we don't
          # ship auto-updates yet) and matching an empty glob would fail
          # the upload step under fail_on_unmatched_files.
          files: |
            apps/desktop/release/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
