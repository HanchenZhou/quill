<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="plume" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- macOS Big Sur–style rounded background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Feather, based on lucide's path, scaled & centered -->
  <g transform="translate(96, 96) scale(34)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Plume body, slightly tinted fill so the silhouette reads at small sizes -->
    <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"
          fill="url(#plume)" stroke="#f8fafc" stroke-width="1.5"/>
    <!-- Center vein -->
    <line x1="17.5" y1="15" x2="9" y2="15"
          stroke="#94a3b8" stroke-width="0.85"/>
    <!-- Quill shaft trailing below -->
    <line x1="16" y1="8" x2="2" y2="22"
          stroke="#f8fafc" stroke-width="1.5"/>
  </g>
</svg>
