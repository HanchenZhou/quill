appId: com.quill.desktop
productName: Quill
copyright: Copyright © 2026

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true

# Declare that Quill knows how to open Markdown files. On macOS this populates
# Info.plist → CFBundleDocumentTypes, which is what Finder reads to populate
# the "Open With" menu.
fileAssociations:
  - ext:
      - md
      - markdown
      - mdown
      - mkd
    name: Markdown Document
    role: Editor
    rank: Default
    icon: build/icon.icns

mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  # No Apple Developer cert configured. `'-'` = ad-hoc signing (codesign
  # --sign -). On Apple Silicon every binary MUST carry at least an
  # ephemeral signature or macOS rejects launch with "Quill is damaged".
  # With ad-hoc, first-launch still warns ("unidentified developer"), but
  # the user can right-click → Open / accept via System Settings.
  identity: '-'
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  writeUpdateInfo: false
  artifactName: Quill-${version}-${arch}.dmg

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
